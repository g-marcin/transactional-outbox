name: CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outbox_demo
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt -r app/requirements-dev.txt

      - name: Run linting
        run: |
          ruff check app
          ruff format --check app
          cd app && mypy .

      - name: Initialize database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/outbox_demo
        run: |
          psql $DATABASE_URL < init.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/outbox_demo
        run: |
          python -m pytest app/tests -v

      - name: Generate OpenAPI docs
        run: |
          python scripts/generate_docs.py --all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: |
            openapi.json
            api-docs.html
            API.md

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/transactional-outbox-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./worker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/transactional-outbox-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

          scp -P "$VPS_PORT" docker-compose.prod.yml root@"$VPS_HOST":~/transactional-outbox-dist/

          # Values are expanded by the runner shell, then the script is piped to the
          # remote bash via stdin so it does not depend on sshd AcceptEnv.
          ssh -p "$VPS_PORT" root@"$VPS_HOST" 'bash -s' <<EOF
          set -euo pipefail
          cd ~/transactional-outbox-dist
          export DATABASE_URL='$DATABASE_URL'
          export DOCKER_USERNAME='$DOCKER_USERNAME'
          echo '$DOCKER_PASSWORD' | docker login -u '$DOCKER_USERNAME' --password-stdin
          for attempt in 1 2 3; do
            docker compose -f docker-compose.prod.yml pull && break
            if [ "\$attempt" = 3 ]; then echo "Pull failed after 3 attempts" >&2; exit 1; fi
            echo "Pull attempt \$attempt failed, retrying..." >&2
            sleep 5
          done
          docker compose -f docker-compose.prod.yml up -d
          EOF

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
