name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Login to Docker registry
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push app image
      - uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/transactional-outbox-app:latest

      # Build and push worker image
      - uses: docker/build-push-action@v4
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/transactional-outbox-worker:latest

      # Deploy to VPS
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p $VPS_PORT $VPS_HOST >> ~/.ssh/known_hosts

          # Copy docker-compose.prod.yml to VPS
          scp -P $VPS_PORT docker-compose.prod.yml root@$VPS_HOST:~/transactional-outbox-dist/

          # Deploy
          ssh -p $VPS_PORT root@$VPS_HOST << 'EOF'
            cd ~/transactional-outbox-dist
            export DATABASE_URL=$DATABASE_URL
            docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
          EOF
