services:
  app:
    image: ${DOCKER_USERNAME}/transactional-outbox-app:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "18750:8000"
    restart: unless-stopped

  worker:
    image: ${DOCKER_USERNAME}/transactional-outbox-worker:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
